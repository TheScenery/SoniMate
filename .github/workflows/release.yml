name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Build release DMG
        run: make dmg

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: SoniMate-*.dmg
          generate_release_notes: true
