name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release bundle
        run: make bundle

      - name: Pack .app into zip
        run: zip -r SoniMate.zip SoniMate.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: SoniMate.zip
          generate_release_notes: true
